spring.application.name=bookstore

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/zwel?useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=zwel
spring.datasource.password=password
spring.sql.init.mode=always
spring.batch.jdbc.initialize-schema=always
spring.jpa.hibernate.ddl-auto=create-drop


spring.data.rest.base-path=/api

server.port=8070

server.ssl.enabled=true
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=tomcat

server.ssl.key-store=/etc/ssl/private/springboot-example.p12
server.ssl.key-store-password=changeit




